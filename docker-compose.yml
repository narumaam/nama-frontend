version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# NAMA Travel Platform - Docker Compose for Local Development & Staging
# ─────────────────────────────────────────────────────────────────────────────
#
# Services:
#   - db: PostgreSQL 15 with persistence
#   - redis: Redis 7 for caching
#   - backend: FastAPI application with gunicorn + alembic migrations
#   - frontend: Next.js frontend
#
# Networks:
#   - nama_network: Internal network for service-to-service communication
#
# Volumes:
#   - postgres_data: Database persistence
#   - redis_data: Redis persistence (optional, for development)
#
# To start: docker-compose up -d
# To view logs: docker-compose logs -f [service-name]
# To stop: docker-compose down

services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database Service
  # ─────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: nama_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nama_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nama_password}
      POSTGRES_DB: ${DB_NAME:-nama_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nama_user} -d ${DB_NAME:-nama_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nama_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache Service
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nama_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - nama_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # FastAPI Backend Service
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nama_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${DB_USER:-nama_user}:${DB_PASSWORD:-nama_password}@db:5432/${DB_NAME:-nama_db}

      # Redis configuration
      REDIS_URL: redis://redis:6379/0

      # Application secrets (MUST be set in .env file for production)
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:-your-refresh-secret-key-change-in-production}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Optional: API/Service Keys
      AI_BUDGET_USD: ${AI_BUDGET_USD:-100}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}

      # Gunicorn configuration
      GUNICORN_BIND: 0.0.0.0:8000
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./main.py:/app/main.py
    networks:
      - nama_network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Next.js Frontend Service
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    container_name: nama_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Backend API URL for client-side requests
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

      # Node environment
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - nama_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
# Volumes: Named volumes for data persistence
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks: Custom network for service communication
# ─────────────────────────────────────────────────────────────────────────────
networks:
  nama_network:
    driver: bridge
    name: nama_network
