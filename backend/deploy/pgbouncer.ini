; PgBouncer Configuration for NAMA Production
; ==============================================
;
; PgBouncer is a lightweight PostgreSQL connection pooler that multiplexes
; application connections into fewer backend database connections.
;
; Key benefits for NAMA:
;   - Handles 10,000+ concurrent client connections
;   - Reduces actual DB connections from N (per app worker) to ~30-50
;   - Supports transaction-level pooling for high throughput
;   - Minimal CPU overhead
;
; Deployment:
;   1. Install: apt-get install pgbouncer
;   2. Configure: /etc/pgbouncer/pgbouncer.ini
;   3. Auth:     /etc/pgbouncer/userlist.txt (see below)
;   4. Start:    systemctl start pgbouncer
;   5. Monitor:  psql -h 127.0.0.1 -p 6432 -U pgbouncer pgbouncer
;
; For high-availability, run multiple PgBouncer instances behind a load balancer.

[databases]
; Define the backend PostgreSQL database
; Syntax: database_name = host=... port=... dbname=... user=... password=...
nama_db = host=127.0.0.1 port=5432 dbname=nama_db user=nama_user password=CHANGE_ME_IN_PRODUCTION

[pgbouncer]
; ── Listening ─────────────────────────────────────────────────────────────────
; Application servers connect to PgBouncer on this address:port
listen_port = 6432
listen_addr = 127.0.0.1
; For multi-machine setup, use: listen_addr = 0.0.0.0
; Then put PgBouncer behind a reverse proxy or ensure it's only internally accessible

; ── Authentication ─────────────────────────────────────────────────────────────
; md5: Hash-based (secure for local networks)
; plain: Clear-text (NOT recommended for untrusted networks)
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
; auth_file syntax: "username" "password_hash" (from SELECT md5('password' || 'username'))

; ── Connection Pooling ─────────────────────────────────────────────────────────
; pool_mode = transaction (recommended for most apps)
;   - New connection per transaction
;   - Lowest latency for short-lived transactions
;   - Safe for all application patterns
;
; pool_mode = session (connection pinning)
;   - One connection per client session
;   - Higher per-connection overhead
;   - Needed only for session-level state (prepared statements, etc.)
pool_mode = transaction

; ── Client-side limits ──────────────────────────────────────────────────────────
max_client_conn = 10000       ; Max connections from apps (default: 100)
; For 5,000–50,000 users, allocate ~5-10 connections per concurrent user
; E.g., 5,000 concurrent users × 2 conns = 10,000 client connections

; ── Server-side pool size ──────────────────────────────────────────────────────
default_pool_size = 25        ; Connections per server per database (min pool)
min_pool_size = 5             ; Minimum idle connections
reserve_pool_size = 5         ; Extra connections for emergencies
reserve_pool_timeout = 3      ; Time to wait for reserve connection (seconds)

; ── Connection limits ─────────────────────────────────────────────────────────
max_db_connections = 100      ; Hard limit per database (never exceed this)
; Formula: max_db_connections ≥ (default_pool_size × num_servers) + reserve_pool_size
; Example: 25 × 1 server + 5 = 30 (safe for max_db_connections = 100)

; ── Health checks ──────────────────────────────────────────────────────────────
server_reset_query = DISCARD ALL
; Called after a transaction ends to reset connection state
; DISCARD ALL: Clears prepared statements, temp tables, etc.

server_check_query = SELECT 1
; Light query to test if backend is still alive
server_check_delay = 30
; Check backend health every 30 seconds (can be lowered for quicker failover)

; ── Timeouts ───────────────────────────────────────────────────────────────────
server_lifetime = 3600        ; Recycle backend connection after 1 hour
server_idle_timeout = 600     ; Close idle backend connections after 10 minutes
client_idle_timeout = 3600    ; Close idle client connections after 1 hour
query_timeout = 0             ; No query timeout (use application-level timeouts)
connect_timeout = 15          ; Time to connect to backend (seconds)

; ── Logging ────────────────────────────────────────────────────────────────────
log_connections = 0           ; Don't log every connection (noise)
log_disconnections = 0        ; Don't log every disconnection
log_pooler_errors = 1         ; Log only errors
syslog = 0                    ; Send logs to stderr, not syslog (container-friendly)
; For production, consider syslog = 1 with centralized log aggregation

; ── Statistics ─────────────────────────────────────────────────────────────────
stats_period = 60             ; Publish stats every 60 seconds (for monitoring)
; Query: SELECT * FROM pgbouncer.stats

; ── Security ───────────────────────────────────────────────────────────────────
unix_socket_dir = /run/pgbouncer   ; Allow socket connections for local auth
unix_socket_mode = 0777            ; Permissions (0777 = readable by all)

; ── Performance tuning ─────────────────────────────────────────────────────────
pkt_buf = 4096                ; Read buffer size (default 4096)
sbuf_lookahead = 0            ; Don't scan ahead in buffer
server_lifetime_restart_query =   ; No restart query by default

; ── Advanced (do not change without understanding) ───────────────────────────────
verbose = 0                   ; Verbosity (0=quiet, 1=basic, 2=debug)
admin_users = pgbouncer       ; Users who can access admin console
; Access the admin console with: psql -h 127.0.0.1 -p 6432 -U pgbouncer pgbouncer

; Default pool mode settings (can be per-database):
; transaction: reuse connection between client transactions (RECOMMENDED)
; session:     reuse connection for entire client session
; statement:   reuse connection between statements (rarely needed)
