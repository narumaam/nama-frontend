name: E2E Tests

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-e2e-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-e2e-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --break-system-packages
          pip install pytest pytest-asyncio

      - name: Set environment variables for E2E testing
        run: |
          echo "DATABASE_URL=sqlite:///./test_e2e.db" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-32-chars-minimum!!" >> $GITHUB_ENV
          echo "REFRESH_SECRET_KEY=test-refresh-key-32-chars-minimum!" >> $GITHUB_ENV
          echo "TESTING=true" >> $GITHUB_ENV
          echo "E2E_BASE_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Start backend server
        run: |
          cd 07_Developer_Project
          python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -f http://localhost:8000/health || curl -f http://localhost:8000/api/health; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
        continue-on-error: false

      - name: Seed demo data
        run: |
          python backend/seed_demo.py
        continue-on-error: true

      - name: Run E2E tests
        run: |
          pytest backend/tests/e2e/ -v --tb=short

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
            test_e2e.db
          retention-days: 7
