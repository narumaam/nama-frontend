<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAMA OS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0B1120;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #94a3b8;
    }
    .card {
      text-align: center;
      max-width: 380px;
      padding: 48px 32px;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: #14B8A6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 24px;
      color: #0F172A;
      margin: 0 auto 24px;
    }
    h1 { color: #fff; font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    p { font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #14B8A6;
      color: #0F172A;
      border: none;
      padding: 12px 32px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    button:hover { background: #0FA898; }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">N</div>
    <h1>You're Offline</h1>
    <p>
      <span class="dot"></span>No internet connection detected.<br />
      NAMA OS needs connectivity to sync your data.
    </p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
